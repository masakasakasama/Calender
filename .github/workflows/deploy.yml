name: Deploy to GitHub Pages

# デプロイは main からのみ（github-pages 環境は main 以外を拒否するため）。
# 手動実行(Run workflow)も可能。
on:
  push:
    branches:
      - main
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ権限を付与。
permissions:
  contents: read
  pages: write
  id-token: write

# Pages デプロイは進行中のものをキャンセルしない（公式推奨）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # GitHub Pages の base パス '/Calender/' でビルド。
      # Firebase Web config は公開前提の値。本番URLでFirebaseログインを有効にする。
      # まずは masakasakasama.man@gmail.com だけで試験運用する。
      - run: npm run build
        env:
          VITE_BASE: /Calender/
          # デプロイごとに変わるビルド識別子（実行番号 + コミットSHA）。
          VITE_BUILD_NUMBER: ${{ github.run_number }}
          VITE_COMMIT_SHA: ${{ github.sha }}
          VITE_PARTNER_EMAIL: masakasakasama.man@gmail.com
          VITE_REBECCA_EMAIL: rere.geier@gmail.com
          # 2人で購読する共有Googleカレンダー（共有予定の書き込み先）
          VITE_GOOGLE_SHARED_CALENDAR_ID: aafa5f8d536a1350c75a521c817f9c285194bd57ea2f3699dfd322a8e496aa5f@group.calendar.google.com
          VITE_FIREBASE_API_KEY: AIzaSyDBBD1W-zneFDNi1eZCtYqvyoXyJcmdk0k
          VITE_FIREBASE_AUTH_DOMAIN: warikan-app-120fd.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: warikan-app-120fd
          VITE_FIREBASE_STORAGE_BUCKET: warikan-app-120fd.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "43289931875"
          VITE_FIREBASE_APP_ID: 1:43289931875:web:1c1cfe7c703871659e4856
          VITE_GOOGLE_MAPS_API_KEY: AIzaSyDBBD1W-zneFDNi1eZCtYqvyoXyJcmdk0k
          # AI（Geminiデートプラン提案）用キー。GitHub Secret に GEMINI_API_KEY を
          # 登録すると有効になる。未登録ならAIは出ず、Web検索ボタンにフォールバック。
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # SPA フォールバック: 直リンク/リロード時に index.html を返す。
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
