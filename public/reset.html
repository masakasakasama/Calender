<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>calender reset</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #e9f0fa;
        color: #4f5b6f;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(86vw, 420px);
        padding: 28px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 16px 42px rgba(90, 120, 170, 0.18);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        padding: 13px 20px;
        border-radius: 999px;
        background: #8fb0e3;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>calender を更新中</h1>
      <p>古いPWAキャッシュを消しています。数秒後に自動で開き直します。</p>
      <a id="open" href="/Calender/">今すぐ開く</a>
    </main>
    <script>
      (async () => {
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((reg) => reg.unregister()));
          }
          if ('caches' in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map((key) => caches.delete(key)));
          }
        } catch (_) {
          // Continue to the app even if a browser blocks one of the cleanup steps.
        }
        const next = `/Calender/?fresh=${Date.now()}`;
        document.getElementById('open').href = next;
        setTimeout(() => window.location.replace(next), 900);
      })();
    </script>
  </body>
</html>
